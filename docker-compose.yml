services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-production
    environment:
      HOST: ${HOST}
      HTTPS_ENABLED: ${PROD_HTTPS_ENABLED}
      HTTPS_PORT: ${PROD_HTTPS_PORT}
      HTTPS_CERT_FILE: /app/certs/cert.pem
      HTTPS_KEY_FILE: /app/certs/key.pem
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${PROD_ALLOWED_ORIGINS}
    ports:
      - "${PROD_HTTPS_EXTERNAL_PORT}:${PROD_HTTPS_PORT}"
    volumes:
      - backend_certs:/app/certs
    restart: unless-stopped

volumes:
  backend_certs:
